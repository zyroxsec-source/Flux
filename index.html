<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost-Flux Chat</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: white; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 15px; max-width: 70%; word-wrap: break-word; }
        .user { background: #007bff; align-self: flex-end; }
        .bot { background: #333; align-self: flex-start; }
        #input-container { padding: 20px; display: flex; gap: 10px; background: #1e1e1e; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: none; background: #333; color: white; }
        button { padding: 10px 20px; border: none; border-radius: 5px; background: #007bff; color: white; cursor: pointer; }
    </style>
</head>
<body>

<div id="chat-container"></div>
<div id="input-container">
    <input type="text" id="user-input" placeholder="Frag mich was..." onkeypress="if(event.key === 'Enter') sendMessage()">
    <button onclick="sendMessage()">Senden</button>
</div>

<script>
async function sendMessage() {
    const inputField = document.getElementById("user-input");
    const chatContainer = document.getElementById("chat-container");
    const text = inputField.value.trim();
    if (!text) return;

    chatContainer.innerHTML += `<div class="message user">${text}</div>`;
    inputField.value = "";
    chatContainer.scrollTop = chatContainer.scrollHeight;

    const botMessageId = "bot-" + Date.now();
    chatContainer.innerHTML += `<div class="message bot" id="${botMessageId}">Überlege...</div>`;
    chatContainer.scrollTop = chatContainer.scrollHeight;

    try {
        // Wir nutzen den cors-anywhere Proxy, um die CORS-Sperre des Browsers zu umgehen
        const proxyUrl = "https://cors-anywhere.herokuapp.com/";
        const targetUrl = "https://api-inference.huggingface.co/models/meta-llama/Meta-Llama-3-8B-Instruct";

        const response = await fetch(proxyUrl + targetUrl, {
            method: "POST",
            headers: {
                "Authorization": "Bearer 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",
                "Content-Type": "application/json",
                "X-Requested-With": "XMLHttpRequest"
            },
            body: JSON.stringify({ 
                inputs: text,
                parameters: { max_new_tokens: 250, return_full_text: false }
            })
        });

        const result = await response.json();
        const botDiv = document.getElementById(botMessageId);
        
        if (result && result[0] && result[0].generated_text) {
            botDiv.innerText = result[0].generated_text;
        } else if (result.error) {
            botDiv.innerText = "Fehler: " + result.error;
        } else {
            botDiv.innerText = "Konnte keine Antwort generieren.";
        }
    } catch (error) {
        document.getElementById(botMessageId).innerText = "Proxy verlangt Aktivierung oder ist überlastet. Schau in F12.";
        console.error("Error:", error);
    }
    chatContainer.scrollTop = chatContainer.scrollHeight;
}
</script>

</body>
</html>
